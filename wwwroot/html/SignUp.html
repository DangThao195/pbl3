<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Organic Grocery - Sign Up</title>
    <!-- Link CSS Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link href="../css/site.css" rel="stylesheet" />

    <!--Icon CDN FontAwesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        .gender-options {
            display: flex;
            gap: 15px;
        }

        .gender-option {
            flex: 1;
        }

        .form-check-input {
            margin-top: 0;
        }
    </style>
</head>

<body>
    <div class="row">
        <div class="col-2"></div>
        <div class="col-8 d-flex flex-column justify-content-center align-items-center min-vh-100 py-5">
            <!-- Nội dung form đăng ký -->
            <div class="w-100">
                <!-- Thêm wrapper để kiểm soát chiều rộng -->
                <p class="text-center mb-4" style="font-size: 64px; font-weight: bold; letter-spacing: 10px;">SIGN UP</p>

                <!-- Hàng 1: Full Name và Email -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="floatingName" placeholder="Full Name">
                            <label for="floatingName"><i class="bi bi-person-badge-fill"></i> Full Name</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="email" class="form-control" id="floatingEmail" placeholder="Email">
                            <label for="floatingEmail"><i class="bi bi-envelope-fill"></i> Email</label>
                        </div>
                    </div>
                </div>

                <!-- Hàng 2: Phone và Date of Birth -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="tel" class="form-control" id="floatingPhone" placeholder="Phone Number">
                            <label for="floatingPhone"><i class="bi bi-telephone-fill"></i> Phone Number</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="date" class="form-control" id="floatingDate" placeholder="Date of Birth">
                            <label for="floatingDate"><i class="bi bi-calendar-fill"></i> Date of Birth</label>
                        </div>
                    </div>
                </div>

                <!-- Gender (vẫn full width) -->
                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-gender-ambiguous"></i> Gender</label>
                    <div class="gender-options">
                        <div class="form-check gender-option">
                            <input class="form-check-input" type="radio" name="gender" id="male" value="male">
                            <label class="form-check-label" for="male">Male</label>
                        </div>
                        <div class="form-check gender-option">
                            <input class="form-check-input" type="radio" name="gender" id="female" value="female">
                            <label class="form-check-label" for="female">Female</label>
                        </div>
                        <div class="form-check gender-option">
                            <input class="form-check-input" type="radio" name="gender" id="other" value="other">
                            <label class="form-check-label" for="other">Other</label>
                        </div>
                    </div>
                </div>

                <!-- Address (vẫn full width) -->
                <div class="form-floating mb-3">
                    <textarea class="form-control" id="floatingAddress" placeholder="Address" style="height: 100px"></textarea>
                    <label for="floatingAddress"><i class="bi bi-house-fill"></i> Address</label>
                </div>

                <!-- Hàng 3: Username và Password -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="floatingUsername" placeholder="User Name">
                            <label for="floatingUsername"><i class="bi bi-person-fill"></i> User Name</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating position-relative">
                            <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
                            <label for="floatingPassword"><i class="bi bi-lock-fill"></i> Password</label>
                            <i class="bi bi-eye-fill position-absolute end-0 top-50 translate-middle-y me-3" id="togglePassword" style="cursor: pointer;"></i>
                        </div>
                    </div>
                </div>

                <!-- Confirm Password (vẫn full width) -->
                <div class="form-floating mb-3 position-relative">
                    <input type="password" class="form-control" id="floatingConfirmPassword" placeholder="Confirm Password">
                    <label for="floatingConfirmPassword"><i class="bi bi-lock-fill"></i> Confirm Password</label>
                    <i class="bi bi-eye-fill position-absolute end-0 top-50 translate-middle-y me-3" id="toggleConfirmPassword" style="cursor: pointer;"></i>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="agreeTerms">
                        <label class="form-check-label" for="agreeTerms">I agree to the <a href="#" class="text-primary">Terms & Conditions</a></label>
                    </div>
                </div>

                <a href="HomePage.html" class="btn btn-dark w-100 mb-3 py-2 text-decoration-none">SIGN UP</a>

                <div class="d-flex align-items-center my-3">
                    <hr class="flex-grow-1">
                    <span class="mx-3 text-muted">Or sign in with</span>
                    <hr class="flex-grow-1">
                </div>

                <div class="d-flex justify-content-center gap-3 mb-3">
                    <button class="btn btn-outline-secondary rounded-circle p-2 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                        <i class="bi bi-google"></i>
                    </button>
                    <button class="btn btn-outline-secondary rounded-circle p-2 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                        <i class="bi bi-threads"></i>
                    </button>
                    <button class="btn btn-outline-secondary rounded-circle p-2 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                        <i class="bi bi-facebook"></i>
                    </button>
                    <button class="btn btn-outline-secondary rounded-circle p-2 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                        <i class="bi bi-instagram"></i>
                    </button>
                </div>

                <div class="text-center">
                    Already have an account? <a href="SignIn.html" class="text-primary text-decoration-underline">Sign in now</a>
                </div>
            </div>
        </div>
        <div class="col-2"></div>
    </div>

    <!-- Link JS Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function () {
            const passwordInput = document.getElementById('floatingPassword');
            const icon = this;

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.replace('bi-eye-fill', 'bi-eye-slash-fill');
            } else {
                passwordInput.type = 'password';
                icon.classList.replace('bi-eye-slash-fill', 'bi-eye-fill');
            }
        });

        // Toggle confirm password visibility
        document.getElementById('toggleConfirmPassword').addEventListener('click', function () {
            const confirmPasswordInput = document.getElementById('floatingConfirmPassword');
            const icon = this;

            if (confirmPasswordInput.type === 'password') {
                confirmPasswordInput.type = 'text';
                icon.classList.replace('bi-eye-fill', 'bi-eye-slash-fill');
            } else {
                confirmPasswordInput.type = 'password';
                icon.classList.replace('bi-eye-slash-fill', 'bi-eye-fill');
            }
        });
    </script>
</body>
</html>
